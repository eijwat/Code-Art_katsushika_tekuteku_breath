// --- Wave geometry ---
function bezier(pts, t) {
  let p = pts.map(q => ({x:q[0], y:q[1]}));
  while (p.length > 1) {
    const n = [];
    for (let i = 0; i < p.length-1; i++)
      n.push({x: p[i].x+(p[i+1].x-p[i].x)*t, y: p[i].y+(p[i+1].y-p[i].y)*t});
    p = n;
  }
  return p[0];
}
function bezierTan(pts, t) {
  const a = bezier(pts, Math.max(0,t-.003));
  const b = bezier(pts, Math.min(1,t+.003));
  const dx=b.x-a.x, dy=b.y-a.y, l=Math.sqrt(dx*dx+dy*dy)||1;
  return {x:dx/l, y:dy/l};
}

const wM=[[-.05,.85],[.10,.80],[.18,.55],[.25,.22],[.38,.08],[.52,.10],[.58,.22],[.55,.45]];
const wCr=[[.38,.08],[.45,.03],[.55,.05],[.62,.15],[.60,.30],[.52,.42]];
const sF=[[[.48,.04],[.54,-.02],[.60,.02]],[[.52,.06],[.60,.00],[.65,.08]],[[.55,.09],[.64,.04],[.68,.14]],[[.44,.05],[.50,-.03],[.57,.01]],[[.42,.07],[.47,-.01],[.54,.03]]];
const wS=[[.62,.90],[.70,.70],[.78,.45],[.85,.30],[.92,.25],[.98,.35]];
const wT=[[.88,.88],[.92,.72],[.96,.55],[1.02,.45]];
const wTr=[[.48,.70],[.55,.75],[.62,.80],[.65,.90]];
const fuji={x:.72,y:.58};
const curves=[[wM,5,'wave'],[wCr,4,'crest'],[wS,3,'wave'],[wT,1.5,'wave'],[wTr,1.5,'trough']];

function spawnPt() {
  const tw = curves.reduce((s,c)=>s+c[1],0);
  let r = Math.random()*tw;
  for (const [pts,w,typ] of curves) {
    r -= w; if (r<=0) {
      const t=Math.random(), p=bezier(pts,t), tg=bezierTan(pts,t);
      const sp=(Math.random()-.5)*.08;
      return {x:p.x+tg.y*sp, y:p.y-tg.x*sp, typ, tg};
    }
  }
  const t=Math.random(), p=bezier(wM,t);
  return {x:p.x,y:p.y,typ:'wave',tg:{x:1,y:0}};
}
function spawnSpray() {
  const f=sF[Math.floor(Math.random()*sF.length)];
  const t=Math.random(), p=bezier(f,t);
  return {x:p.x+(Math.random()-.5)*.02, y:p.y+(Math.random()-.5)*.02, typ:'spray', tg:bezierTan(f,t)};
}

// --- Tide Breath (波の呼吸) ---
// Non-uniform cycle: gather → surge → crash → retreat
// Phase: 0→0.3 gather(溜め), 0.3→0.5 surge(押し寄せ), 0.5→0.6 crash(砕け), 0.6→1.0 retreat(引き波)
let tidePhase = 0;
let tideBreath = 0;    // -1(引き) ~ +1(押し寄せ) の呼吸値
let tideSurge = 0;     // smooth surge intensity for particles
let tideCrash = 0;     // crash moment burst

function updateTideBreath(dt, sp) {
  const period = 6.0 / sp; // 息スライダーで周期を変える
  tidePhase += dt / period;
  if (tidePhase > 1) tidePhase -= 1;

  const p = tidePhase;
  if (p < 0.30) {
    // 溜め — ゆっくり引きながらエネルギーを蓄える
    const local = p / 0.30;
    // easeInQuad: 最初はほぼ静止、徐々に引く力が増す
    tideBreath = -0.3 * local * local;
    tideSurge = 0.3 + 0.2 * local; // base flow stays gentle
    tideCrash = 0;
  } else if (p < 0.50) {
    // 押し寄せ — 一気に加速（ザバーン！）
    const local = (p - 0.30) / 0.20;
    // easeOutCubic: 急激に立ち上がる
    const ease = 1 - Math.pow(1 - local, 3);
    tideBreath = -0.3 + 1.3 * ease;
    tideSurge = 0.5 + 1.5 * ease;
    tideCrash = ease > 0.7 ? (ease - 0.7) / 0.3 : 0;
  } else if (p < 0.60) {
    // 砕け — ピーク後の爆発的な散乱
    const local = (p - 0.50) / 0.10;
    tideBreath = 1.0 - 0.5 * local;
    tideSurge = 2.0 - 1.0 * local;
    tideCrash = 1.0 - local;
  } else {
    // 引き波 — ゆっくり引いていく（息を吐くように）
    const local = (p - 0.60) / 0.40;
    // easeInOutSine: 自然な減衰
    const ease = 0.5 - 0.5 * Math.cos(local * Math.PI);
    tideBreath = 0.5 * (1 - ease) - 0.3 * ease;
    tideSurge = 1.0 - 0.7 * ease;
    tideCrash = 0;
  }
}

// --- Flow ---
function flow(nx, ny, time, fury) {
  const wcx=.45, wcy=.30, dx=nx-wcx, dy=ny-wcy;
  const d=Math.sqrt(dx*dx+dy*dy), circ=Math.exp(-d*3)*2.5;
  let fx=-dy*circ, fy=dx*circ;
  if(nx<.4&&ny>.2){const s=(.4-nx)*(ny-.2)*6;fy-=s;fx+=s*.3;}
  if(nx>.35&&nx<.65&&ny<.2){fx+=1.5;fy+=(.2-ny)*3;}
  if(nx>.42&&nx<.7&&ny<.15){const s=(.15-ny)*fury*8;fx+=Math.cos(time*2+nx*10)*s;fy-=s*.5;}
  if(ny>.6){fx+=.5;fy+=.1;}
  const d2x=nx-.85,d2y=ny-.45,d2=Math.sqrt(d2x*d2x+d2y*d2y);
  fx+=-d2y*Math.exp(-d2*4)*1.2; fy+=d2x*Math.exp(-d2*4)*1.2;
  const dfx=nx-fuji.x,dfy=ny-fuji.y,df=Math.sqrt(dfx*dfx+dfy*dfy);
  if(df<.12){fx-=dfx*.5;fy-=dfy*.5;fx*=.3;fy*=.3;}
  const tb=fury*.8;
  fx+=Math.sin(nx*15+time*1.5)*tb;fy+=Math.cos(ny*12-time*1.2)*tb;
  fy+=(.5-ny)*.08;

  // === 波の呼吸をフロー場に乗せる ===
  // 押し寄せ時: 波頭方向（左上→右下のうねり）に加速
  const surgeDir = tideBreath;
  fx *= (0.6 + 0.4 * tideSurge); // base flow modulation
  fy *= (0.6 + 0.4 * tideSurge);

  // 波頭付近で押し寄せの力を強調
  if (nx > .3 && nx < .7 && ny < .35) {
    fx += surgeDir * 1.2;
    fy -= Math.abs(surgeDir) * 0.3;
  }

  // 砕ける瞬間: 上方向への散乱力（飛沫感）
  if (tideCrash > 0 && ny < .25) {
    fx += (Math.random() - 0.4) * tideCrash * 2.0;
    fy -= tideCrash * 1.5 * Math.random();
  }

  // 引き波: 下方向への引き戻し
  if (surgeDir < 0 && ny > .4) {
    fy += (-surgeDir) * 0.4;
    fx -= (-surgeDir) * 0.2;
  }

  return [fx,fy];
}

// --- Emotion ---
let emotion=0, emotionTarget=0;
const emoNames=[[-1,-.5,'嵐の底'],[-.5,-.2,'暗 潮'],[-.2,-.05,'引き波'],[-.05,.05,'富士の静'],[.05,.2,'潮 騒'],[.2,.5,'白 波'],[.5,1,'怒 濤']];

// --- Ghost (fading tekuteku) ---
class Ghost {
  constructor(x,y,sz,angle,typ) {
    this.x=x;this.y=y;this.sz=sz;this.angle=angle;
    this.life=0;this.ml=40+Math.random()*50;this.typ=typ;
    this.vx=typ==='spray'?(Math.random()-.5)*.02:0;
    this.vy=typ==='spray'?-.01:-.002;
    this.spin=(Math.random()-.5)*.05;
  }
  update(){this.life++;this.x+=this.vx;this.y+=this.vy;this.vy*=.98;this.angle+=this.spin;return this.life<this.ml;}
  draw(){
    const age=this.life/this.ml, a=Math.max(0,(1-age)*.3);
    const px=this.x*W, py=this.y*H;
    if(px<-50||px>W+50||py<-50||py>H+50) return;
    const sizeKey = this.sz <= 16 ? 14 : this.sz <= 24 ? 20 : this.sz <= 32 ? 28 : 36;
    const img = tekuImages[sizeKey]; if(!img) return;
    const drawSz = this.sz * (1+age*.5);
    cx.save(); cx.globalAlpha=a;
    cx.translate(px,py); cx.rotate(this.angle);
    cx.drawImage(img, -drawSz/2, -drawSz/2, drawSz, drawSz);
    cx.restore();
  }
}

// --- Particle (tekuteku) ---
class Particle {
  constructor(){this.init(true);}
  init(silent){
    const isSp=Math.random()<.12;
    const sp=isSp?spawnSpray():spawnPt();
    this.x=sp.x;this.y=sp.y;this.typ=sp.typ;
    this.vx=sp.tg.x*(1+Math.random())*(isSp?2:0.5)*.01;
    this.vy=sp.tg.y*(1+Math.random())*(isSp?2:0.5)*.01;
    this.life=0;
    this.maxLife=isSp?(30+Math.random()*60):(120+Math.random()*400);
    // Size: tekuteku size in pixels, varied for depth
    const depth=this.y;
    this.sz = isSp ? (8+Math.random()*10) : (10+Math.random()*18 + (1-depth)*6);
    this.phase=Math.random()*Math.PI*2;
    this.angle=Math.random()*Math.PI*2;
    // Roll speed: proportional to velocity, direction-aware
    this.rollSpeed = 0;
    this.born=!silent;
  }
  update(dt){
    const sp=parseFloat(document.getElementById('sp').value);
    const fury=parseFloat(document.getElementById('fury').value);
    const teku=parseFloat(document.getElementById('teku').value);
    const [fx,fy]=flow(this.x,this.y,t*sp,fury);
    const jl=emotion>0?emotion*Math.sin(t*sp+this.phase)*.3:0;
    const sd=emotion<0?1+(-emotion)*.2:1;
    const br=Math.sin(t*.06*sp)*.3+Math.sin(t*.023*sp)*.2;
    const bf=br*(this.x<.5?1.5:.5);
    this.vx+=(fx+bf*.3)*.0015*teku;
    this.vy+=(fy+jl-bf*.5)*.0015*teku;
    // 引き波時にダンピングが強まり、テクテクの動きが「溜まる」
    const tideDamp = 0.93 - Math.max(0, -tideBreath) * 0.04;
    this.vx*=tideDamp/sd;this.vy*=tideDamp/sd;
    if(this.typ==='spray'){this.vy+=.0004*teku;this.vx*=.98;}
    this.x+=this.vx*dt;this.y+=this.vy*dt;
    this.life+=dt;
    // Rolling: angle changes based on velocity, scaled by teku
    const speed = Math.sqrt(this.vx*this.vx+this.vy*this.vy);
    this.rollSpeed = speed * 80 * teku * (this.vx >= 0 ? 1 : -1);
    this.angle += this.rollSpeed * dt;
    if(this.life>this.maxLife||this.x<-.05||this.x>1.05||this.y<-.05||this.y>1.05){
      ghosts.push(new Ghost(this.x,this.y,this.sz,this.angle,this.typ));
      this.init(false);
    }
  }
  draw(){
    const age=this.life/this.maxLife;
    let alpha;
    if(age<.05) alpha=age/.05;
    else if(age>.8){alpha=(1-age)/.2;alpha=Math.max(0,alpha+Math.sin(this.life*.3)*.15*(1-alpha));}
    else alpha=1;
    const breathe=.75+.25*Math.sin(this.life*.02+this.phase);
    // 波の呼吸でテクテク全体が膨らんだり縮んだりする
    const tideBreathScale = 1.0 + tideBreath * 0.08;
    const a=Math.min(1,alpha*breathe*.9);
    const px=this.x*W, py=this.y*H;
    if(px<-50||px>W+50||py<-50||py>H+50) return;
    // Choose image size based on particle size
    const sizeKey = this.sz <= 16 ? 14 : this.sz <= 24 ? 20 : this.sz <= 32 ? 28 : 36;
    const img = tekuImages[sizeKey]; if(!img) return;
    let drawSz = this.sz;
    if(this.typ==='spray') drawSz *= (1-age*.5);
    else drawSz *= (.85+.3*Math.sin(age*Math.PI));
    if(age<.05) drawSz*=(.5+age/.05*.5);
    drawSz *= tideBreathScale;
    drawSz = Math.max(1, drawSz);
    cx.save();
    cx.globalAlpha=a;
    cx.translate(px,py);
    cx.rotate(this.angle);
    cx.drawImage(img, -drawSz/2, -drawSz/2, drawSz, drawSz);
    cx.restore();
    // Birth glow
    if(this.born && age<.06){
      const ba=(1-age/.06)*.12;
      cx.strokeStyle=`rgba(230,235,225,${ba})`;
      cx.lineWidth=.3;
      cx.beginPath();cx.arc(px,py,Math.max(0,drawSz/2+3+age*40),0,Math.PI*2);cx.stroke();
    }
  }
}

function sz(){
  W=Math.min(window.innerWidth-40,1020);
  H=Math.min(W*.618,540);
  cv.width=W*dpr;cv.height=H*dpr;
  cv.style.width=W+'px';cv.style.height=H+'px';
  cx.setTransform(dpr,0,0,dpr,0,0);
}

function rebirth(){
  t=0;emotion=0;emotionTarget=0;
  tidePhase=0;tideBreath=0;tideSurge=0;tideCrash=0;
  parts=[];ghosts=[];
  for(let i=0;i<800;i++) parts.push(new Particle());
  cx.fillStyle='#0a0e14';cx.fillRect(0,0,W,H);
}

let lastEmo=0;
function loop(){
  const fd=parseFloat(document.getElementById('fd').value);
  const sp=parseFloat(document.getElementById('sp').value);

  // === 波の呼吸を更新 ===
  updateTideBreath(0.016, sp);

  // 背景色を呼吸と連動（押し寄せ時にわずかに明るく）
  const tideGlow = Math.max(0, tideBreath) * 0.15;
  const bgR=Math.round(10+(emotion>0?emotion*5:0) + tideGlow*20);
  const bgG=Math.round(14+(emotion>0?emotion*3:emotion) + tideGlow*15);
  const bgB=Math.round(20+(emotion<0?-emotion*8:0) + tideGlow*25);
  cx.fillStyle=`rgba(${bgR},${bgG},${bgB},${1-fd})`;
  cx.fillRect(0,0,W,H);
  t+=.016;
  // Fuji glow — 引き波の時に富士がより見える
  const fcx=fuji.x*W, fcy=fuji.y*H, fh=H*.10;
  const fujiBreathBonus = Math.max(0, -tideBreath) * 0.015;
  const ga=.02+Math.sin(t*.05)*.01 + fujiBreathBonus;
  cx.fillStyle=`rgba(215,195,160,${ga})`;
  cx.beginPath();cx.arc(fcx,fcy,Math.max(0,fh*1.5),0,Math.PI*2);cx.fill();
  // Emotion
  const cycle=Math.sin(t*.035)*.35+Math.sin(t*.019)*.3+Math.sin(t*.067)*.2;
  if(t-lastEmo>.5){emotionTarget=cycle*.7;emotionTarget=Math.max(-1,Math.min(1,emotionTarget));lastEmo=t;}
  emotion+=(emotionTarget-emotion)*.008;
  for(const p of parts) p.update(1);
  // Sort by size (smaller = farther = draw first)
  parts.sort((a,b)=>a.sz-b.sz);
  for(const p of parts) p.draw();
  ghosts=ghosts.filter(g=>{g.draw();return g.update();});
  if(ghosts.length>150) ghosts=ghosts.slice(-150);
  // Foam — 波が砕ける瞬間に泡が爆発的に増える
  const fury=parseFloat(document.getElementById('fury').value);
  const foamChance = .03 + fury*.03 + tideCrash * 0.15 + Math.max(0, tideBreath) * 0.05;
  const foamBursts = tideCrash > 0.5 ? 3 : 1;
  for (let fb = 0; fb < foamBursts; fb++) {
    if(Math.random()<foamChance){
      const ft=.3+Math.random()*.4,fp=bezier(wCr,ft);
      const foamAlpha = .2+emotion*.2 + tideCrash * 0.3;
      const foamSize = 1+Math.random()*2 + tideCrash * 2;
      cx.fillStyle=`rgba(230,235,225,${Math.min(0.8,foamAlpha)})`;
      cx.beginPath();cx.arc(fp.x*W+(Math.random()-.5)*15,fp.y*H+(Math.random()-.5)*10,Math.max(0.1,foamSize),0,Math.PI*2);cx.fill();
    }
  }
  const en=emoNames.find(e=>emotion>=e[0]&&emotion<e[1]);
  if(en){el.textContent=en[2];const h=emotion<0?215+emotion*15:215-emotion*180;el.style.color=`hsl(${h},25%,${Math.round(32+(emotion+1)*12)}%)`;}
  requestAnimationFrame(loop);
}

function startArt(){sz();rebirth();loop();}
window.addEventListener('resize',()=>{sz();rebirth();});
</script>
</body>
</html>
